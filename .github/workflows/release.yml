name: Release gateway

on:
  push:
    branches: [main]
    paths:
      - "**"
      - "!README.md"

permissions:
  contents: write

env:
  REGISTRY: externalacr.azurecr.io
  IMAGE_NAME: clawline-gateway

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version & short SHA
        id: meta
        run: |
          VERSION=$(node -p "require('./package.json').version")
          SHA_SHORT=$(git rev-parse --short HEAD)
          TAG="v${VERSION}-${SHA_SHORT}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "sha_short=${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "image_full=${REGISTRY}/${IMAGE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: externalacr
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image_full }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.image_full }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Package release tarball
        run: |
          # Ensure git index is clean to avoid tar warning
          git status
          tar czf "gateway-${{ steps.meta.outputs.tag }}.tar.gz" \
            --exclude='node_modules' \
            --exclude='data' \
            --exclude='.git' \
            . || [ $? -eq 1 ]

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: "gateway ${{ steps.meta.outputs.version }} (${{ steps.meta.outputs.sha_short }})"
          body: |
            ## Clawline Gateway ${{ steps.meta.outputs.version }}

            **Docker image:**
            ```
            docker pull ${{ steps.meta.outputs.image_full }}:${{ steps.meta.outputs.tag }}
            ```

            **Run:**
            ```bash
            docker run -d -p 19080:19080 \
              -e RELAY_ADMIN_TOKEN=your-token \
              -v relay-data:/app/data \
              ${{ steps.meta.outputs.image_full }}:${{ steps.meta.outputs.tag }}
            ```
          files: gateway-${{ steps.meta.outputs.tag }}.tar.gz
